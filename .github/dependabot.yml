# Overview:
# - Purpose: Configure automatic dependency update pull requests.
# - Used by: GitHub Dependabot.
# - Adds: Low-effort dependency maintenance for workflows and Python metadata.
# - Can I delete this?: Yes, if your course does not want automated dependency PRs.
# - Learn more: https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Lightweight Python dependency checks for projects using pip metadata.
  # If this template stays conda-only, this update block will be mostly quiet.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
