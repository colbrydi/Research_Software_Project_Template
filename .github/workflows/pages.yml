# Overview:
# - Purpose: Build and publish API docs automatically with GitHub Pages.
# - Used by: GitHub Actions on pushes to main/master and manual runs.
# - Adds: Automatic docs publication without committing generated docs.
# - Learn more: https://docs.github.com/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages
name: Publish Docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pdoc
        run: |
          python -m pip install --upgrade pip
          pip install pdoc

      - name: Build API docs
        run: |
          pdoc --docformat google -o docs mypackage

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
